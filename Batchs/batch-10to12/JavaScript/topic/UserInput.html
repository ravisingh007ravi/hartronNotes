<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex justify-center items-center h-screen bg-black">

  <div class="bg-white p-5 rounded-2xl space-y-5">
    <h1 class="text-center font-bold text-2xl">User Input</h1>
    <input id="inputValue"
      class="bg-gray-700 w-full py-2 px-5 rounded-md placeholder:text-orange-600 text-white border-none focus:outline-none shadow-lg shadow-orange-800"
      type="text" placeholder="Enter a Number...">

    <div class="flex flex-col gap-3">
      <button onclick="upper()"
        class="bg-orange-500 py-2 text-white font-semibold rounded-md hover:bg-orange-800 hover:scale-110 duration-300">UpperCase</button>
      <button onclick="lower()"
        class="bg-pink-500 py-2 text-white font-semibold rounded-md hover:bg-pink-800 hover:scale-110 duration-300">LowerCase</button>
      <button onclick="vowelCount()"
        class="bg-blue-500 py-2 text-white font-semibold rounded-md hover:bg-blue-800 hover:scale-110 duration-300">Count
        Vowel</button>
      <button onclick="Even()"
        class="bg-purple-500 py-2 text-white font-semibold rounded-md hover:bg-purple-800 hover:scale-110 duration-300">Even
        or Odd</button>
    </div>

    <p id="rsult" class="text-center font-semibold">Result</p>
  </div>

  <script>

    function upper() {
      let n = document.getElementById('inputValue').value
      if (n.length == 0) {
        return document.getElementById('rsult').innerHTML = '😒😒😒Empty Value😍😍😍'
      }
      else {
        return document.getElementById('rsult').innerHTML = n.toUpperCase()
      }
    }

    function lower() {
      let n = document.getElementById('inputValue').value
      if (n.length == 0) {
        return document.getElementById('rsult').innerHTML = 'Empty Value'
      }
      else {
        return document.getElementById('rsult').innerHTML = n.toLowerCase()
      }
    }

    function vowelCount() {
      let str = document.getElementById('inputValue').value
      let c = 0
      
      for (char of str) {
        if (['a', 'e', 'i', 'o', 'u'].includes(char.toLowerCase())) c++
      }
      return document.getElementById('rsult').innerHTML = c
    }

    function Even() {
      let n = parseInt(document.getElementById('inputValue').value)
      if (n % 2 == 0) {
        return document.getElementById('rsult').innerHTML = 'Even'
      }
      else {
        return document.getElementById('rsult').innerHTML = 'Odd'
      }
    }
  </script>

</body>

</html>
