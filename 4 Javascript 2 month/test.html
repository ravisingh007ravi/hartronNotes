<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1 id="r">Hello</h1>
    <button onclick="abc()">Click</button>
    <button onclick="ab()">Click</button>


    <script>
        const abc = ()=>{
            return document.getElementById('r').innerHTML = 'Byeee'
        }

        const ab = ()=>{
            return document.getElementById('r').innerHTML = 'Hiii'
        }
    </script>
</body>
</html>
